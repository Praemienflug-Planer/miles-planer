<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-label="Screenshot-Zusammenfassung Cashpreis Rückflug Palma nach Düsseldorf: 132,19 Euro Economy Comfort pro Person"><rect width="1100" height="720" fill="#f6f8fb"/><rect x="40" y="35" width="1020" height="650" rx="26" fill="#fff" stroke="#d9e2ef"/><text x="80" y="95" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#071a44">Cashpreis: Palma → Düsseldorf</text><text x="80" y="135" font-family="Arial,sans-serif" font-size="18" fill="#53627a">Vergleichspreis aus der Tarifauswahl · Economy Comfort · via Frankfurt</text><line x1="90" y1="220" x2="780" y2="220" stroke="#d4dce8" stroke-width="3"/><circle cx="90" cy="220" r="8" fill="#071a44"/><circle cx="435" cy="220" r="7" fill="#071a44"/><circle cx="780" cy="220" r="8" fill="#071a44"/><text x="80" y="195" font-family="Arial,sans-serif" font-size="44" font-weight="700" fill="#071a44">13:15</text><text x="80" y="252" font-family="Arial,sans-serif" font-size="24" fill="#071a44">PMI</text><text x="392" y="205" font-family="Arial,sans-serif" font-size="16" fill="#53627a">1h 25min FRA</text><text x="725" y="195" font-family="Arial,sans-serif" font-size="44" font-weight="700" fill="#071a44">17:45</text><text x="745" y="252" font-family="Arial,sans-serif" font-size="24" fill="#071a44">DUS</text><rect x="820" y="160" width="200" height="180" rx="18" fill="#416a42"/><text x="920" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#fff">Economy</text><text x="920" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#fff">Comfort</text><text x="920" y="292" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="800" fill="#fff">132,19 €</text><rect x="90" y="390" width="920" height="190" rx="18" fill="#f8fafc" stroke="#d9e2ef"/><text x="130" y="440" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#071a44">Vergleich für die Meilenrechnung</text><text x="130" y="485" font-family="Arial,sans-serif" font-size="20" fill="#24344d">Cashpreis 132,19 € minus Award-Zuzahlung 52,69 € = 79,50 € Ersparnis.</text><text x="130" y="528" font-family="Arial,sans-serif" font-size="20" fill="#24344d">Der Rückflug bringt weniger Gegenwert pro Meile als der Hinflug.</text><text x="80" y="640" font-family="Arial,sans-serif" font-size="15" fill="#64748b">Eigene Recherche/Screenshot nachgebaut als lesbare Web-Grafik.</text></svg>