<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" role="img" aria-labelledby="title desc"><title id="title">Kaufland Geschenkkarte Beispiel</title><desc id="desc">Beispielhafte Darstellung einer Kaufland Geschenkkarte mit geschwärztem Barcodebereich.</desc><rect width="900" height="900" fill="#f5f5f5"/><rect x="55" y="55" width="790" height="790" rx="26" fill="#fff" stroke="#ddd"/><rect x="55" y="55" width="790" height="330" fill="#c91414"/><g opacity=".28" fill="#ffffff"><circle cx="120" cy="110" r="28"/><circle cx="190" cy="180" r="34"/><circle cx="285" cy="115" r="30"/><circle cx="385" cy="210" r="36"/><circle cx="505" cy="120" r="33"/><circle cx="650" cy="200" r="37"/><circle cx="760" cy="120" r="31"/><circle cx="810" cy="260" r="28"/></g><rect x="335" y="95" width="230" height="170" fill="#fff" stroke="#e01e26" stroke-width="8"/><text x="390" y="205" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#e01e26">Kaufland</text><text x="170" y="340" font-family="Arial, sans-serif" font-size="66" font-weight="700" fill="#fff">Geschenkkarte</text><rect x="95" y="440" width="330" height="120" fill="#fff" stroke="#222" stroke-width="4"/><text x="142" y="485" font-family="Arial, sans-serif" font-size="34" fill="#222">Geschenkkarte über</text><text x="170" y="540" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#111">50,00 EUR</text><text x="480" y="445" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#d22">SO SMART LÖSEN SIE IHR</text><text x="480" y="485" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#d22">GESCHENKKARTEN-GUTHABEN</text><text x="480" y="525" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#d22">AN DER KASSE EIN:</text><text x="480" y="585" font-family="Arial, sans-serif" font-size="22" fill="#555">Zeigen Sie an der Kasse die</text><text x="480" y="615" font-family="Arial, sans-serif" font-size="22" fill="#555">Geschenkkarte auf dem Smartphone</text><text x="480" y="645" font-family="Arial, sans-serif" font-size="22" fill="#555">oder ausgedruckt vor.</text><rect x="115" y="585" width="300" height="120" rx="24" fill="#000"/><text x="130" y="760" font-family="Arial, sans-serif" font-size="18" fill="#777">Barcode / Code vollständig geschwärzt</text><line x1="70" y1="720" x2="830" y2="720" stroke="#999" stroke-width="3" stroke-dasharray="12 12"/><text x="130" y="800" font-family="Arial, sans-serif" font-size="18" fill="#666">Beispielhafte Momentaufnahme. Bedingungen und Verfügbarkeit vorher prüfen.</text></svg>