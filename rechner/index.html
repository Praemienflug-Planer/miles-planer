<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prämienflug-Rechner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="brand">Prämienflug-Rechner</div>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="tool-layout">
        <div class="tool-main">
          <div class="tool-card">
            <h2>Reisedaten</h2>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="ziel">Ziel</label>
                <select id="ziel">
                  <option value="">Bitte wählen</option>
                  <option value="thailand">Thailand</option>
                  <option value="newyork">New York</option>
                </select>
              </div>
              <div class="field-group">
                <label for="personen">Personen</label>
                <input id="personen" type="number" value="1" min="1" />
              </div>
              <div class="field-group">
                <label for="monat">Reisemonat</label>
                <select id="monat">
                  <option>Januar</option><option>Februar</option><option>März</option>
                  <option>April</option><option>Mai</option><option>Juni</option>
                  <option>Juli</option><option>August</option><option>September</option>
                  <option>Oktober</option><option>November</option><option>Dezember</option>
                </select>
              </div>
              <div class="field-group">
                <label for="jahr">Reisejahr</label>
                <select id="jahr"></select>
              </div>
              <div class="field-group">
                <label for="programm">Programm</label>
                <select id="programm">
                  <option value="">Bitte wählen</option>
                  <option>Miles & More</option>
                </select>
              </div>
              <div class="field-group">
                <label for="klasse">Reiseklasse</label>
                <select id="klasse">
                  <option>Economy</option><option>Premium Economy</option>
                  <option>Business</option><option>First</option>
                </select>
              </div>
              <div class="field-group">
                <label for="zeit">Reisezeit</label>
                <select id="zeit">
                  <option>Hauptsaison</option><option>Nebensaison</option>
                </select>
              </div>
              <div class="field-group">
                <label for="flex">Flexibilität</label>
                <select id="flex">
                  <option value="">Bitte wählen</option>
                  <option value="0">Keine</option>
                  <option value="3">+/- 3 Tage</option>
                  <option value="7">+/- 1 Woche</option>
                </select>
              </div>
            </div>
          </div>

          <div class="tool-card">
            <h2>Punktestand</h2>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="bestand">Aktueller Bestand</label>
                <input id="bestand" type="number" value="" />
              </div>
              <div class="field-group">
                <label for="transfer">Transferfähiger Bestand</label>
                <input id="transfer" type="number" value="" />
              </div>
              <div class="field-group">
                <label for="bonus">Geplanter Bonus</label>
                <input id="bonus" type="number" value="" />
              </div>
              <div class="field-group">
                <label for="rate">Monatliche Sammelrate</label>
                <input id="rate" type="number" value="" />
              </div>
            </div>
            <button class="btn btn-primary" onclick="berechne()">Jetzt berechnen</button>
          </div>
        </div>

        <div class="tool-sidebar">
          <div class="tool-card">
            <h3>So funktioniert es</h3>
            <ul>
              <li>Ziel, Reisende und Klasse wählen</li>
              <li>Reisezeitraum festlegen</li>
              <li>Punktestand eingeben</li>
              <li>Ergebnis: Ampel, Lücke, Zeitplan</li>
            </ul>
          </div>
          <div class="tool-card">
            <h3>Transferhinweis</h3>
            <p>Wähle ein Programm aus, um den passenden Hinweis zu sehen.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Füge Jahresauswahl automatisch hinzu
    const jahrSelect = document.getElementById("jahr");
    const currentYear = new Date().getFullYear();
    for (let i = 0; i < 10; i++) {
      const opt = document.createElement("option");
      opt.value = opt.text = currentYear + i;
      jahrSelect.appendChild(opt);
    }

    function berechne() {
      // Beispielaktion: Ersetze durch Navigationslogik oder Ergebnisausgabe
      alert("Berechnung gestartet - Implementierung folgt");
    }
  </script>
</body>
</html>
