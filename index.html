<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4 Seats Miles Planner</title>
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <div class="container">
    <h1>✈️ 4 Seats Miles Planner</h1>
    <p class="subtitle">Interaktive Berechnung mit Google Sheets</p>

    <div id="inputView" class="view active">
      <div class="card">
        <h2>Eingaben</h2>

        <div id="step-ziel" class="step-block active">
          <label for="ziel">Ziel</label>
          <select id="ziel"></select>
        </div>

        <div id="step-personen" class="step-block">
          <label for="personen">Personen</label>
          <select id="personen">
            <option value="">Bitte wählen</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
        </div>

        <div id="step-reiseklasse" class="step-block">
          <label for="reiseklasse">Reiseklasse</label>
          <select id="reiseklasse"></select>
        </div>

        <div id="step-reisezeit" class="step-block">
          <label for="reisezeit">Reisezeit</label>
          <select id="reisezeit"></select>
        </div>

        <div id="step-reisemonat" class="step-block">
          <label for="reisemonat">Reisemonat</label>
          <select id="reisemonat"></select>
        </div>

        <div id="step-reisejahr" class="step-block">
          <label for="reisejahr">Reisejahr</label>
          <input id="reisejahr" type="number" value="2030" />
        </div>

        <div id="step-programm" class="step-block">
          <label for="programm">Programm</label>
          <select id="programm"></select>
        </div>

        <div id="step-punkte" class="step-block">
          <div class="step-divider"></div>

          <h3 class="section-title">Punkte & Sammelrate</h3>
          <p id="pointsHelper" class="helper-text"></p>

          <label id="labelBestandAktuell" for="bestandAktuell">Aktueller Bestand</label>
          <input id="bestandAktuell" type="number" value="" placeholder="z. B. 190000" />

          <label id="labelTransferBestand" for="transferBestand">Transferfähiger Bestand</label>
          <input id="transferBestand" type="number" value="" placeholder="z. B. 50000" />

          <label id="labelGeplanterBonus" for="geplanterBonus">Geplanter Bonus</label>
          <input id="geplanterBonus" type="number" value="" placeholder="z. B. Kreditkarten-Willkommensbonus" />

          <label id="labelMonatlicheSammelrate" for="monatlicheSammelrate">Monatliche Sammelrate</label>
          <input id="monatlicheSammelrate" type="number" value="" placeholder="z. B. 12000" />

          <button onclick="berechneMilesPlaner()">Jetzt berechnen</button>

          <div class="affiliate-disclaimer">
            ℹ️ Dieser Rechner ist kostenlos nutzbar. Zur Finanzierung können auf einzelnen Seiten Empfehlungen mit Partnerlinks erscheinen.
          </div>
        </div>
      </div>
    </div>

    <div id="resultView" class="view">
      <div class="card">
        <div class="result-header">
          <h2>Ergebnis</h2>
          <button class="secondary-btn" onclick="zurueckZuEingaben()">← Eingaben ändern</button>
        </div>

        <div id="result">Bitte Eingaben machen und auf „Jetzt berechnen“ klicken.</div>
      </div>
    </div>
  </div>

  <script src="script.js?v=13"></script>
</body>
</html>
