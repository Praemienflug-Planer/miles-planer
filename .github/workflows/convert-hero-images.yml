name: Convert hero images to WebP

# Touch this workflow file to trigger a fresh conversion run when needed.
on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/hero/*.png'
      - '.github/workflows/convert-hero-images.yml'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install WebP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Convert hero PNG files to WebP
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(assets/hero/*.png)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PNG files found in assets/hero."
            exit 0
          fi
          for file in "${files[@]}"; do
            output="${file%.png}.webp"
            cwebp -quiet -q 78 -resize 1920 0 "$file" -o "$output"
            echo "Converted $file -> $output"
          done

      - name: Show generated files
        run: |
          ls -lh assets/hero

      - name: Commit WebP files
        run: |
          if [ -z "$(git status --porcelain assets/hero/*.webp 2>/dev/null)" ]; then
            echo "No WebP changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/hero/*.webp
          git commit -m "Generate WebP hero images"
          git push
