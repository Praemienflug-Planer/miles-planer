name: Link PAYBACK transfer page

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'meilen-sammeln/payback-punkte-miles-and-more/index.html'
      - '.github/workflows/link-payback-transfer-page.yml'

permissions:
  contents: write

jobs:
  link-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add internal links to PAYBACK transfer page
        shell: python
        run: |
          from pathlib import Path

          new_url = '/miles-planer/meilen-sammeln/payback-punkte-miles-and-more/'

          sammeln = Path('meilen-sammeln/index.html')
          text = sammeln.read_text(encoding='utf-8')
          if new_url not in text:
              needle = '<a class="article-card" href="/miles-planer/meilen-sammeln/payback/"><p class="eyebrow">PAYBACK</p><h3>PAYBACK Punkte sammeln und umwandeln</h3><p>Der einfachste Einstieg: Punkte im Alltag sammeln, Coupons nutzen und später zu Miles-&amp;-More-Meilen übertragen.</p></a>'
              insert = needle + '\n          <a class="article-card" href="/miles-planer/meilen-sammeln/payback-punkte-miles-and-more/"><p class="eyebrow">PAYBACK → Miles &amp; More</p><h3>PAYBACK Punkte zu Miles &amp; More übertragen</h3><p>Schritt-für-Schritt-Anleitung zur 1:1-Umwandlung, mit Beispielrechnung, Transferbonus und typischen Fehlern.</p></a>'
              text = text.replace(needle, insert)
              sidebar_needle = '<a href="/miles-planer/meilen-sammeln/payback/">PAYBACK Guide</a>'
              sidebar_insert = sidebar_needle + '<a href="/miles-planer/meilen-sammeln/payback-punkte-miles-and-more/">PAYBACK zu Miles &amp; More übertragen</a>'
              text = text.replace(sidebar_needle, sidebar_insert)
              sammeln.write_text(text, encoding='utf-8')

          payback = Path('meilen-sammeln/payback/index.html')
          text = payback.read_text(encoding='utf-8')
          if new_url not in text:
              transfer_needle = '<p>PAYBACK Punkte können ein wichtiger Baustein für Miles &amp; More sein. Die Standardumwandlung erfolgt grundsätzlich im Verhältnis 1:1: Aus 1 PAYBACK Punkt wird 1 Miles-&amp;-More-Meile.</p>'
              transfer_insert = transfer_needle + '<p>Eine ausführliche Schritt-für-Schritt-Anleitung findest du hier: <a href="/miles-planer/meilen-sammeln/payback-punkte-miles-and-more/">PAYBACK Punkte zu Miles &amp; More übertragen</a>.</p>'
              text = text.replace(transfer_needle, transfer_insert)
              sidebar_needle = '<a href="#historische-transferboni">Historische Transferboni</a>'
              sidebar_insert = '<a href="/miles-planer/meilen-sammeln/payback-punkte-miles-and-more/">PAYBACK zu Miles &amp; More übertragen</a>' + sidebar_needle
              text = text.replace(sidebar_needle, sidebar_insert)
              payback.write_text(text, encoding='utf-8')

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No internal link changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meilen-sammeln/index.html meilen-sammeln/payback/index.html
          git commit -m "Link PAYBACK transfer guide internally"
          git push
