name: Apply central site shell

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - '_layouts/default.html'
      - '_includes/header.html'
      - '_includes/footer.html'
      - 'assets/js/site-shell.js'
      - '.github/workflows/apply-central-shell.yml'

permissions:
  contents: write

jobs:
  add-front-matter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add default layout front matter to existing HTML pages
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            case "$file" in
              ./_layouts/*|./_includes/*|./_site/*) continue ;;
            esac

            first_line="$(head -n 1 "$file" || true)"
            if [ "$first_line" != "---" ]; then
              tmp="$(mktemp)"
              {
                printf '%s\n' '---'
                printf '%s\n' 'layout: default'
                printf '%s\n' '---'
                cat "$file"
              } > "$tmp"
              mv "$tmp" "$file"
              echo "Prepared $file"
            fi
          done < <(find . -name '*.html' -type f -print0)

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No HTML pages needed migration."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply central layout to HTML pages"
          git push
