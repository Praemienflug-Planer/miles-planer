name: One-time custom domain cleanup

on:
  push:
    paths:
      - '.github/workflows/custom-domain-cleanup.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace old GitHub Pages URLs and project paths
        shell: bash
        run: |
          set -euo pipefail

          find . -type f \
            \( -name '*.html' -o -name '*.js' -o -name '*.css' -o -name '*.xml' -o -name '*.txt' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' \) \
            ! -path './.git/*' \
            -print0 | while IFS= read -r -d '' file; do
              perl -0pi -e 's#https://praemienflug-planer\.github\.io/miles-planer/#https://praemienflug-planer.de/#g' "$file"
              perl -0pi -e 's#https://praemienflug-planer\.github\.io/miles-planer#https://praemienflug-planer.de#g' "$file"
              perl -0pi -e 's#/miles-planer/assets/#/assets/#g' "$file"
              perl -0pi -e 's#/miles-planer/#/#g' "$file"
            done

      - name: Keep sitemap and robots on custom domain
        shell: bash
        run: |
          set -euo pipefail
          test -f sitemap.xml
          test -f robots.txt
          grep -q 'https://praemienflug-planer.de/sitemap.xml' robots.txt
          grep -q 'https://praemienflug-planer.de/' sitemap.xml
          if grep -R "praemienflug-planer.github.io\|/miles-planer/" --include='*.html' --include='*.js' --include='*.css' --include='*.xml' --include='*.txt' --include='*.md' --include='*.yml' --include='*.yaml' .; then
            echo 'Old URL or /miles-planer/ path still found.'
            exit 1
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No cleanup changes needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Clean up URLs for custom domain'
          git push
