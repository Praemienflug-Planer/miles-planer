name: Bump hero CSS version

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace hero background CSS version
        run: |
          set -euo pipefail
          NEW_VERSION="20260511-2"
          grep -RIl "hero-background.css?v=" . \
            --include='*.html' \
            --include='*.md' \
            --exclude-dir='.git' \
            --exclude-dir='_site' \
            | xargs sed -i -E "s#hero-background\.css\?v=[0-9]{8}-[0-9]+#hero-background.css?v=${NEW_VERSION}#g"

      - name: Show changed files
        run: git status --short

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No hero CSS version changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Bump hero background CSS cache version"
          git push
