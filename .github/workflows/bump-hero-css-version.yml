name: Bump hero CSS version

# Touch this workflow file to trigger a cache-version bump run when needed.
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/bump-hero-css-version.yml'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace hero background CSS version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          new_version = "20260511-2"
          pattern = re.compile(r"hero-background\.css\?v=\d{8}-\d+")
          replacement = f"hero-background.css?v={new_version}"
          changed = []

          for suffix in ("*.html", "*.md"):
              for path in Path(".").rglob(suffix):
                  if any(part in {".git", "_site"} for part in path.parts):
                      continue
                  text = path.read_text(encoding="utf-8")
                  new_text = pattern.sub(replacement, text)
                  if new_text != text:
                      path.write_text(new_text, encoding="utf-8")
                      changed.append(str(path))

          if changed:
              print("Updated hero CSS cache version in:")
              for item in changed:
                  print(f"- {item}")
          else:
              print("No hero CSS cache versions needed updating.")
          PY

      - name: Show changed files
        run: git status --short

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No hero CSS version changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Bump hero background CSS cache version"
          git push
