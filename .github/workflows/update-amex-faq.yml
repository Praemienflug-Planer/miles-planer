name: Update Amex FAQ and irreversible transfer warning

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-amex-faq.yml'

permissions:
  contents: write

jobs:
  update-amex-faq:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Amex FAQ and transfer warning
        shell: python
        run: |
          from pathlib import Path

          path = Path('meilen-sammeln/amex/index.html')
          text = path.read_text(encoding='utf-8')

          old_schema = '''    "mainEntity": [
      {"@type":"Question","name":"Was sind American Express Membership Rewards Punkte?","acceptedAnswer":{"@type":"Answer","text":"Membership Rewards ist das Punkteprogramm von American Express. Die Punkte können gesammelt und später zu verschiedenen Airline- und Hotelprogrammen übertragen oder anderweitig eingelöst werden."}},
      {"@type":"Question","name":"Welche Amex Transferpartner sind besonders interessant?","acceptedAnswer":{"@type":"Answer","text":"Für Prämienflüge sind vor allem Airline-Partner wie British Airways Club, Iberia Club, Flying Blue, SAS EuroBonus, Singapore Airlines KrisFlyer, Cathay Pacific Asia Miles oder Emirates Skywards interessant. Entscheidend sind jedoch Transferverhältnis, Verfügbarkeit und Gebühren."}},
      {"@type":"Question","name":"Wie viele Meilen bekomme ich aus 100.000 Membership Rewards Punkten?","acceptedAnswer":{"@type":"Answer","text":"Das hängt vom Transferpartner ab. Bei 5:4 entstehen 80.000 Einheiten, bei 3:2 rund 66.667 Einheiten, bei 2:1 50.000 Einheiten, bei 1:1 100.000 Einheiten und bei 1:2 200.000 Einheiten."}},
      {"@type":"Question","name":"Sollte man Amex Punkte sofort übertragen?","acceptedAnswer":{"@type":"Answer","text":"In der Regel sollte man Membership Rewards Punkte erst übertragen, wenn Zielprogramm, Verfügbarkeit und konkrete Einlösung geprüft sind. Transfers sind meist endgültig."}}
    ]'''

          new_schema = '''    "mainEntity": [
      {"@type":"Question","name":"Was sind American Express Membership Rewards Punkte?","acceptedAnswer":{"@type":"Answer","text":"Membership Rewards ist das Punkteprogramm von American Express. Die Punkte können gesammelt und später zu verschiedenen Airline- und Hotelprogrammen übertragen oder anderweitig eingelöst werden."}},
      {"@type":"Question","name":"Welche Amex Transferpartner gibt es?","acceptedAnswer":{"@type":"Answer","text":"Zu den Partnern gehören unter anderem British Airways Club, Iberia Club, Qatar Airways Privilege Club, Finnair Plus, Aer Lingus AerClub, SAS EuroBonus, Air France/KLM Flying Blue, Cathay Pacific Asia Miles, Etihad Guest, Singapore Airlines KrisFlyer, Delta SkyMiles, Emirates Skywards sowie Hotelprogramme wie Hilton Honors, Marriott Bonvoy und Radisson Rewards."}},
      {"@type":"Question","name":"Wie viele Meilen bekomme ich aus 100.000 Membership Rewards Punkten?","acceptedAnswer":{"@type":"Answer","text":"Das hängt vom Transferpartner ab. Bei 5:4 entstehen 80.000 Einheiten, bei 3:2 rund 66.667 Einheiten, bei 2:1 50.000 Einheiten, bei 1:1 100.000 Einheiten und bei 1:2 200.000 Einheiten."}},
      {"@type":"Question","name":"Ist ein Amex Punkte Transfer unumkehrbar?","acceptedAnswer":{"@type":"Answer","text":"Ein Transfer sollte als endgültig betrachtet werden. Sobald Membership Rewards Punkte zu einem Partnerprogramm übertragen wurden, können sie in der Regel nicht zurück zu American Express übertragen werden."}},
      {"@type":"Question","name":"Wann sollte man Amex Punkte übertragen?","acceptedAnswer":{"@type":"Answer","text":"In der Regel erst dann, wenn Zielprogramm, Verfügbarkeit, Gebühren und konkrete Einlösung geprüft sind. Solange die Punkte bei American Express liegen, bleiben sie flexibler."}}
    ]'''
          text = text.replace(old_schema, new_schema)

          transfer_paragraph = '<p>Die wichtigste Regel lautet: <strong>Nicht vorschnell übertragen.</strong> Solange deine Punkte bei American Express liegen, bleiben sie flexibel. Nach dem Transfer bist du an das Zielprogramm gebunden.</p>'
          transfer_warning = transfer_paragraph + '\n        <div class="warning-box"><strong>Transfer ist in der Regel unumkehrbar:</strong><br><br>Übertrage Membership Rewards Punkte erst, wenn du Zielprogramm, Verfügbarkeit, Gebühren und konkrete Einlösung geprüft hast. Nach dem Transfer können die Punkte normalerweise nicht zurück zu American Express übertragen werden.</div>'
          if 'Transfer ist in der Regel unumkehrbar' not in text:
              text = text.replace(transfer_paragraph, transfer_warning)

          old_faq = '''      <div class="article-card seo-card" id="faq">
        <p class="eyebrow">FAQ</p>
        <h2>Häufige Fragen zu American Express Membership Rewards</h2>
        <div class="faq-list">
          <div class="faq-item">
            <h3>Welche Amex Transferpartner gibt es?</h3>
            <p>Zu den Partnern gehören unter anderem British Airways Club, Iberia Club, Qatar Airways Privilege Club, Finnair Plus, Aer Lingus AerClub, SAS EuroBonus, Air France/KLM Flying Blue, Cathay Pacific Asia Miles, Etihad Guest, Singapore Airlines KrisFlyer, Delta SkyMiles, Emirates Skywards sowie Hilton Honors, Marriott Bonvoy und Radisson Rewards.</p>
          </div>
          <div class="faq-item">
            <h3>Wie viele Meilen bekomme ich aus 100.000 Amex Punkten?</h3>
            <p>Das hängt vom Partner ab. Bei 5:4 entstehen 80.000 Einheiten, bei 3:2 rund 66.667 Einheiten, bei 2:1 50.000 Einheiten, bei 1:1 100.000 Einheiten und bei 1:2 200.000 Einheiten.</p>
          </div>
          <div class="faq-item">
            <h3>Ist British Airways oder Iberia besser?</h3>
            <p>Beide nutzen Avios und haben in der dargestellten Übersicht ein 5:4-Verhältnis. Welche Variante besser ist, hängt von Strecke, Verfügbarkeit, Gebühren und konkreter Einlösung ab.</p>
          </div>
          <div class="faq-item">
            <h3>Sind Hotelpunkte eine gute Nutzung für Amex Punkte?</h3>
            <p>Das kann sinnvoll sein, ist aber nicht automatisch besser. Hotelpunkte müssen immer mit dem konkreten Cashpreis, der benötigten Punktezahl und möglichen Statusvorteilen verglichen werden.</p>
          </div>
          <div class="faq-item">
            <h3>Sollte man Amex Punkte sofort übertragen?</h3>
            <p>Meistens nein. Der Transfer sollte erst erfolgen, wenn Zielprogramm, Verfügbarkeit und Einlösung geprüft sind.</p>
          </div>
        </div>
      </div>'''

          new_faq = '''      <div class="article-card seo-card" id="faq">
        <p class="eyebrow">FAQ</p>
        <h2>Die 5 wichtigsten Fragen zu American Express Membership Rewards</h2>
        <div class="faq-list">
          <div class="faq-item">
            <h3>1. Was sind American Express Membership Rewards Punkte?</h3>
            <p>Membership Rewards ist das Punkteprogramm von American Express. Du sammelst zunächst flexible Punkte und kannst sie später zu verschiedenen Airline- und Hotelprogrammen übertragen oder anderweitig einlösen.</p>
          </div>
          <div class="faq-item">
            <h3>2. Welche Amex Transferpartner gibt es?</h3>
            <p>Zu den Partnern gehören unter anderem British Airways Club, Iberia Club, Qatar Airways Privilege Club, Finnair Plus, Aer Lingus AerClub, SAS EuroBonus, Air France/KLM Flying Blue, Cathay Pacific Asia Miles, Etihad Guest, Singapore Airlines KrisFlyer, Delta SkyMiles, Emirates Skywards sowie Hotelprogramme wie Hilton Honors, Marriott Bonvoy und Radisson Rewards.</p>
          </div>
          <div class="faq-item">
            <h3>3. Wie viele Meilen bekomme ich aus 100.000 Amex Punkten?</h3>
            <p>Das hängt vom Partner ab. Bei 5:4 entstehen 80.000 Einheiten, bei 3:2 rund 66.667 Einheiten, bei 2:1 50.000 Einheiten, bei 1:1 100.000 Einheiten und bei 1:2 200.000 Einheiten.</p>
          </div>
          <div class="faq-item">
            <h3>4. Ist ein Amex Punkte Transfer unumkehrbar?</h3>
            <p>Ja, ein Transfer sollte als endgültig betrachtet werden. Sobald Membership Rewards Punkte zu einem Partnerprogramm übertragen wurden, können sie in der Regel nicht zurück zu American Express übertragen werden.</p>
          </div>
          <div class="faq-item">
            <h3>5. Wann sollte man Amex Punkte übertragen?</h3>
            <p>Meistens erst dann, wenn Zielprogramm, Verfügbarkeit, Gebühren und konkrete Einlösung geprüft sind. Solange deine Punkte bei American Express liegen, bleiben sie deutlich flexibler.</p>
          </div>
        </div>
      </div>'''
          text = text.replace(old_faq, new_faq)

          path.write_text(text, encoding='utf-8')

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No Amex FAQ changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meilen-sammeln/amex/index.html
          git commit -m "Add Amex FAQ and irreversible transfer warning"
          git push
